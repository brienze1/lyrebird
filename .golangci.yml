version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - noctx
    - revive
    - unconvert
    - unparam
  exclusions:
    rules:
      # Table-driven crypto/config tests intentionally probe malformed input;
      # errcheck/gosec noise on those paths isn't actionable.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
