name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned explicitly: golangci-lint-action@v6's "latest" resolved to
          # a stale v1 binary (built with Go 1.24), which can neither run
          # against our go 1.26 target nor parse .golangci.yml's v2 schema.
          version: v2.12.2

      - name: gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            exit 1
          fi

      - name: go test (incl. BDD)
        run: go test ./... -race -covermode=atomic

      - name: docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: lyrebird:ci
