name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        # v6 doesn't support golangci-lint v2 at all ("you must update to
        # golangci-lint-action v7"); v9 is the current major.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            exit 1
          fi

      - name: go test (incl. BDD)
        run: go test ./... -race -covermode=atomic

      # docker-container driver is required for the type=gha cache backend
      # below (the default docker driver silently can't use it); mirrors
      # release.yml's own builder setup so this PR gate build isn't a full,
      # uncached rebuild on every single push while release.yml (which runs
      # far less often) gets layer caching.
      - uses: docker/setup-buildx-action@v4

      - name: docker build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: lyrebird:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
